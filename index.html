<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Contabilidade</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="tela-inicial" class="tela ativa">
        <h1 class="titulo">Contabilicards!</h1>
        
        <div class="menu-botoes">
            <button onclick="iniciarNovoJogo()">Novo Jogo</button>
            <button onclick="carregarJogoSalvo()" id="btn-continuar" style="display: none;">Continuar Jogo</button>
            <button onclick="abrirModal('modal-regras')">Regras</button>
            <button onclick="abrirModal('modal-configs')">Configurações</button>
        </div>

        <div class="rodape">
            <p class="contribuidores">
                <strong>Contribuidores:</strong><br>
                L. Silva (elrunix12)<br>
            </p>
            <p id="licenca"><a href="https://www.gnu.org/licenses/agpl-3.0.txt" target="_blank">Licença do Projeto</a></p>
        </div>
    </div>

    <div id="tela-jogo" class="tela">
        <div class="painel-lateral">
            <button onclick="desfazerJogada()" id="btn-desfazer" disabled>Desfazer Jogada</button>
            <button onclick="refazerJogada()" id="btn-refazer" disabled>Refazer Jogada</button>
            <button onclick="voltarMenu()">Voltar ao Menu</button>
            <hr style="margin: 15px 0;">
            <button onclick="alternarModoProjetor()" id="btn-projetor" style="background-color: #007bff; color: white;">Modo Projetor</button>
            
            <div style="display: flex; gap: 5px; margin-top: 10px;">
                <button onclick="mudarZoom(0.1)" style="flex: 1; font-size: 1.2rem; background: #6c757d; color: white;">Zoom +</button>
                <button onclick="mudarZoom(-0.1)" style="flex: 1; font-size: 1.2rem; background: #6c757d; color: white;">Zoom -</button>
            </div>

            <h3>Grupos</h3>
            <div id="tabela-grupos"></div>
        </div>

        <div class="area-principal">
            <div id="tabuleiro"></div>
        </div>
    </div>

    <div id="modal-regras" class="modal">
        <div class="modal-conteudo">
            <h2>Regras do Jogo</h2>
            <div id="conteudo-regras" style="text-align: left; max-height: 60vh; overflow-y: auto; margin-bottom: 20px; padding: 10px; background: #f8f9fa; border-radius: 4px;">
                Carregando regras...
            </div>
            <button onclick="fecharModal('modal-regras')">Fechar Regras</button>
        </div>
    </div>

    <div id="modal-configs" class="modal">
        <div class="modal-conteudo">
            <h2>Configurações</h2>
            <div style="text-align: left; margin-bottom: 20px;">
                <label style="display: block; margin-bottom: 15px;">
                    <strong>Quantidade de casas no tabuleiro:</strong><br>
                    <small>(Aumente de 4 em 4 para fechar perfeito. Ex: 24, 28, 32, 36)</small><br>
                    <input type="number" id="config-casas" min="16" max="100" step="4" onchange="salvarConfiguracoes()" style="width: 80px; padding: 8px; font-size: 1.1rem; margin-top: 5px;">
                </label>
                <hr style="margin: 15px 0;">
                <label style="display: block; margin-bottom: 15px;">
                    <input type="checkbox" id="config-som" onchange="salvarConfiguracoes()">
                    Ativar som de movimento das peças
                </label>
                <label style="display: block; margin-bottom: 15px;">
                    <input type="checkbox" id="config-exibir-pergunta" onchange="salvarConfiguracoes()">
                    Exibir texto da pergunta e das alternativas na tela (se desmarcado, exibe apenas A, B, C, D...)
                </label>
                <label style="display: block;">
                    <input type="checkbox" id="config-penalidade-tempo" onchange="salvarConfiguracoes()">
                    Marcar como errada automaticamente se o tempo esgotar
                </label>
            </div>
            <button onclick="fecharModal('modal-configs')" style="padding: 10px 20px; font-size: 1.1rem; cursor: pointer;">Salvar e Fechar</button>
        </div>
    </div> 
    
    <div id="modal-selecao-primeiro" class="modal">
        <div class="modal-conteudo" style="max-width: 400px; background: rgba(255, 255, 255, 0.95); box-shadow: 0 10px 30px rgba(0,0,0,0.2);">
            <h2 style="color: #2c3e50; font-size: 2rem; margin-top: 0; margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px;">Quem começa?</h2>
            <div id="lista-selecao-grupos" style="display: flex; flex-direction: column; gap: 10px;">
            </div>
        </div>
    </div>

    <div id="modal-novo-jogo" class="modal">
        <div class="modal-conteudo" style="max-width: 450px;">
            <h2 style="color: #2c3e50; margin-top: 0;">Configurar Partida</h2>
            
            <div style="text-align: left; margin-bottom: 25px;">
                <label style="display: block; margin-bottom: 15px; font-size: 1.1rem;">
                    <strong>Quantidade de Grupos (1 a 10):</strong><br>
                    <input type="number" id="input-qtd-grupos" min="1" max="10" value="4" style="width: 100%; padding: 12px; font-size: 1.2rem; margin-top: 5px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box;">
                    <span id="erro-qtd-grupos" style="color: #dc3545; font-size: 0.9rem; display: none; margin-top: 5px;">Por favor, insira um número entre 1 e 10.</span>
                </label>
                
                <label style="display: flex; align-items: center; gap: 15px; font-size: 1.1rem; cursor: pointer; background: #f8f9fa; padding: 15px; border-radius: 8px; border: 1px solid #ddd; transition: background 0.2s;">
                    <input type="checkbox" id="input-modo-fisico" style="width: 25px; height: 25px; cursor: pointer;">
                    <span><strong>Usar Cards Físicos</strong><br><small style="color: #666;">(O mediador lê as cartas em voz alta)</small></span>
                </label>
            </div>
            
            <div style="display: flex; gap: 10px; justify-content: flex-end;">
                <button onclick="fecharModal('modal-novo-jogo')" style="padding: 12px 20px; font-size: 1.1rem; cursor: pointer; background: #6c757d; color: white; border: none; border-radius: 8px;">Cancelar</button>
                <button onclick="confirmarNovoJogo()" style="padding: 12px 25px; font-size: 1.1rem; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 8px; font-weight: bold;">Iniciar Jogo</button>
            </div>
        </div>
    </div>

    <div id="toast-notificacao" class="toast" onclick="fecharNotificacao()"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
